<div class="todo-container">
    <h2 class="text-center mb-4" style="color: #4facfe; font-weight: 700;">My Tasks</h2>

    <!-- Loader -->
    <div *ngIf="isLoading()" class="loader-container">
        <div class="spinner"></div>
        <p>Loading tasks...</p>
    </div>

    <!-- Data Content -->
    <ng-container *ngIf="!isLoading()">
        <div class="d-flex justify-content-end mb-3 gap-2">
            <button *ngIf="selectedTodoIds().size > 0" class="btn btn-danger" (click)="deleteSelectedTodos()">
                <i class="bi bi-trash3 me-2"></i>Delete Selected ({{selectedTodoIds().size}})
            </button>
            <button class="btn btn-primary add-btn" (click)="openModal()">
                <i class="bi bi-plus-lg me-2"></i>Add Task
            </button>
        </div>
        <div class="container">
            <ng-container *ngIf="totalCount() > 0; else noTasks">
                <div class="table-scroll">
                    <table class="table custom-table table-borderless text-center">
                        <thead>
                            <tr>
                                <th scope="col" style="width: 50px;">
                                    <input class="form-check-input custom-checkbox" type="checkbox" 
                                           [checked]="isAllSelected()" 
                                           (change)="toggleAll($event)">
                                </th>
                                <th scope="col" class="text-start ps-4">Title</th>
                                <th scope="col">Status</th>
                                <th scope="col">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let todo of todos()" class="fade-in-row">
                                <td>
                                    <input class="form-check-input custom-checkbox" type="checkbox" 
                                           [checked]="selectedTodoIds().has(todo.id)" 
                                           (change)="toggleSelection(todo.id)">
                                </td>
                                <td class="text-start ps-4">{{todo.title}}</td>
                                <td>
                                    <span
                                        [class]="todo.isCompleted ? 'badge bg-success status-badge' : 'badge bg-warning text-dark status-badge'">
                                        {{todo.isCompleted ? 'Completed' : 'Pending'}}
                                    </span>
                                </td>
                                <td>
                                    <div class="d-flex justify-content-center gap-2">
                                        <button class="btn btn-outline-danger icon-btn border-0" title="Delete"
                                            (click)="deleteTodo(todo.id)">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                        <button class="btn btn-outline-info icon-btn border-0 text-white" title="Edit"
                                            (click)="openModal(todo)">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </ng-container>
            <ng-template #noTasks>
                <div class="text-center">
                    <p class="text-white">No tasks found.</p>
                </div>
            </ng-template>
        </div>
        <!-- Pagination Controls -->
        <!-- <div class="d-flex justify-content-center align-items-center mt-4 gap-2">
            <button class="btn pagination-btn" [disabled]="currentPage() === 1" (click)="changePage(currentPage() - 1)">
                <i class="bi bi-chevron-left"></i>
            </button>

            <ng-container *ngFor="let page of visiblePages">
                <span *ngIf="page === '...'" class="pagination-dots">...</span>
                <button *ngIf="page !== '...'" class="btn pagination-btn" [class.active]="page === currentPage()"
                    (click)="changePage(asNumber(page))">
                    {{page}}
                </button>
            </ng-container>

            <button class="btn pagination-btn" [disabled]="currentPage() === totalPages()"
                (click)="changePage(currentPage() + 1)">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div> -->
        <div class="card flex justify-center" *ngIf="totalCount() > 0">
            <p-paginator
                (onPageChange)="onPageChange($event)"
                [first]="(currentPage - 1) * itemsPerPage"
                [rows]="itemsPerPage"
                [totalRecords]="totalCount()"
                [rowsPerPageOptions]="[5, 10, 30]"
                [showFirstLastIcon]="true"
                [pageLinkSize]="3"
            ></p-paginator>
        </div>
    </ng-container>
</div>

<!-- Unified Todo Modal -->
<div *ngIf="showModal()" class="modal-backdrop-custom">
    <div class="modal-content-custom">
        <div class="modal-header-custom">
            <h3>{{ isEditing() ? 'Edit Task' : 'Add New Task' }}</h3>
            <button class="btn-close-custom" (click)="closeModal()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div class="modal-body-custom">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" class="form-control custom-input" [(ngModel)]="currentTodo.title"
                    placeholder="What needs to be done?">
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control custom-input" [(ngModel)]="currentTodo.description" rows="3"
                    placeholder="Add more details..."></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-select custom-input" [(ngModel)]="currentTodo.isCompleted">
                    <option [ngValue]="false">Pending</option>
                    <option [ngValue]="true">Completed</option>
                </select>
            </div>
        </div>
        <div class="modal-footer-custom">
            <button class="btn btn-secondary me-2" (click)="closeModal()">Cancel</button>
            <button class="btn btn-primary save-btn" (click)="saveTodo()" [disabled]="!currentTodo.title?.trim()">
                {{ isEditing() ? 'Update Task' : 'Save Task' }}
            </button>
        </div>
    </div>
</div>

<p-toast></p-toast>
<p-toast position="bottom-center" key="confirm" (onClose)="onReject()" [baseZIndex]="5000">
    <ng-template let-message #message>
        <div class="d-flex flex-column w-100">
            
            <div class="d-flex align-items-center gap-2">
                <p-avatar [label]="userInitials" shape="circle" styleClass="bg-primary text-white"></p-avatar>
                <div class="fw-bold">{{ userName }}</div>
            </div>
            
            <div class="fw-medium fs-5 my-3">{{ message.summary }}</div>
            
            <div class="d-flex justify-content-end align-items-center gap-2">
                <p-button severity="secondary" size="small" label="Cancel" (click)="onReject()"></p-button>
                <p-button severity="danger" size="small" label="Delete" (click)="onConfirm()"></p-button>
            </div>

        </div>
    </ng-template>
</p-toast>
